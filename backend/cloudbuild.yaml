steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/strapi-backend", "."]
    dir: "backend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/strapi-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "strapi-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/strapi-backend"
      - "--region"
      - "asia-south1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--add-cloudsql-instances"
      - "$_INSTANCE_CONNECTION_NAME"
      - "--set-env-vars"
      - "DATABASE_CLIENT=postgres,DATABASE_HOST=/cloudsql/${_INSTANCE_CONNECTION_NAME},DATABASE_NAME=strapi,DATABASE_USERNAME=strapi,GCS_BUCKET_NAME=$_GCS_BUCKET_NAME,GCS_PUBLIC_FILES=true,FIREBASE_PROJECT_ID=astroappv2,HOST=0.0.0.0,PORT=8080"
      - "--set-secrets"
      - "APP_KEYS=app-keys:latest,ADMIN_JWT_SECRET=admin-jwt-secret:latest,JWT_SECRET=jwt-secret:latest,API_TOKEN_SALT=api-token-salt:latest,TRANSFER_TOKEN_SALT=transfer-token-salt:latest,ENCRYPTION_KEY=encryption-key:latest,DATABASE_PASSWORD=database-password:latest,FIREBASE_SERVICE_ACCOUNT_KEY=firebase-service-account:latest"

substitutions:
  _INSTANCE_CONNECTION_NAME: "astroinsights-487814:asia-south1:astroapp-db"
  _GCS_BUCKET_NAME: "astroapp-media"

images:
  - "gcr.io/$PROJECT_ID/strapi-backend"
