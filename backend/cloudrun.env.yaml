# Cloud Run Environment Variables Template
# This file contains placeholder values for environment variables
# Real secrets should be stored in GCP Secret Manager and referenced in Cloud Run deployment

# Server Configuration
HOST: "0.0.0.0"
PORT: "8080"

# Public URL – must match the Cloud Run service URL (used for cookies, redirects, and admin panel)
URL: "https://your-service-name.asia-south1.run.app"
ADMIN_PANEL_URL: "/admin"

# Trust Cloud Run's HTTPS proxy so that secure session cookies are issued correctly
IS_PROXIED: "true"

# CORS – comma-separated list of allowed frontend origins
# CORS_ORIGIN: "https://your-frontend.example.com"

# Strapi Secrets (Generate with: openssl rand -base64 32)
# These should be stored in Secret Manager
APP_KEYS: "your-app-key-1,your-app-key-2"
API_TOKEN_SALT: "your-api-token-salt"
ADMIN_JWT_SECRET: "your-admin-jwt-secret"
TRANSFER_TOKEN_SALT: "your-transfer-token-salt"
JWT_SECRET: "your-jwt-secret"
ENCRYPTION_KEY: "your-encryption-key"

# Database Configuration
DATABASE_CLIENT: "postgres"
DATABASE_HOST: "/cloudsql/your-gcp-project-id:asia-south1:your-sql-instance-name"
DATABASE_PORT: "5432"
DATABASE_NAME: "strapi"
DATABASE_USERNAME: "strapi"
DATABASE_PASSWORD: "your-database-password"  # Should be in Secret Manager
DATABASE_SSL: "false"

# Firebase Configuration
FIREBASE_PROJECT_ID: "your-firebase-project-id"
# FIREBASE_SERVICE_ACCOUNT_KEY should be stored in Secret Manager as JSON
# Download from: Firebase console → Project settings → Service accounts → Generate new private key

# GCS Configuration
GCS_BUCKET_NAME: "your-gcs-bucket-name"
GCS_PUBLIC_FILES: "false"
GCS_UNIFORM: "true"

# Notification Configuration (Optional)
# ASTROLOGER_EMAILS: "astrologer1@example.com,astrologer2@example.com"
# ASTROLOGER_PHONES: "+919876543210,+919876543211"
