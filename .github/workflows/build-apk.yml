name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (release or debug)"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate timestamp
        id: timestamp
        run: echo "value=$(date -u +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Fix line endings
        working-directory: .
        run: |
          if [ -d mobile/scripts ]; then
            sudo apt-get -qq install -y dos2unix 2>/dev/null || true
            find mobile/scripts -type f -name "*.sh" -exec dos2unix {} + 2>/dev/null || true
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          # NOTE: Do NOT set cache: "gradle" here — the android/ dir
          # doesn't exist until expo prebuild generates it.

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          cd android
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --build-cache --parallel --no-daemon
          else
            ./gradlew assembleRelease --build-cache --parallel --no-daemon
          fi

      - name: Collect APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          TIMESTAMP="${{ steps.timestamp.outputs.value }}"
          OUTPUT_DIR="apk-output/${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
            APK_NAME="astrowitt-debug-${TIMESTAMP}.apk"
          else
            APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
            APK_NAME="astrowitt-release-${TIMESTAMP}.apk"
          fi
          cp "$APK_SRC" "$OUTPUT_DIR/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"
          ls -lh "$OUTPUT_DIR/$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: "astrowitt-apk-${{ steps.timestamp.outputs.value }}"
          path: "mobile/apk-output/${{ steps.timestamp.outputs.value }}/"
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | ${{ github.event.inputs.build_type || 'release' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | ${{ steps.timestamp.outputs.value }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | astrowitt-apk-${{ steps.timestamp.outputs.value }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | ${{ env.APK_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Retention** | 30 days |" >> $GITHUB_STEP_SUMMARY
