name: Build Android APK

on:
  push:
    tags:
      - "build-*"
      - "v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (release or debug)"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

permissions:
  contents: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Expo GitHub Action
        uses: expo/expo-github-action@8.2.1
        with:
          expo-version: latest
          packager: npm

      - name: Install dependencies
        run: |
          cd mobile
          npm install

      - name: Run Expo Prebuild
        run: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build Android APK
        run: |
          cd mobile/android
          if [ "${{ env.BUILD_TYPE }}" = "debug" ]; then
            ./gradlew assembleDebug --build-cache --parallel
          else
            ./gradlew assembleRelease --build-cache --parallel
          fi

      - name: Generate Timestamp
        id: timestamp
        run: echo "value=$(date -u +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Extract APK
        run: |
          TIMESTAMP="${{ steps.timestamp.outputs.value }}"
          OUTPUT_DIR="apk-output/${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"

          if [ "${{ env.BUILD_TYPE }}" = "debug" ]; then
            REMOTE_APK="mobile/android/app/build/outputs/apk/debug/app-debug.apk"
            APK_NAME="astrowitt-debug-${TIMESTAMP}.apk"
          else
            REMOTE_APK="mobile/android/app/build/outputs/apk/release/app-release.apk"
            APK_NAME="astrowitt-release-${TIMESTAMP}.apk"
          fi

          cp "$REMOTE_APK" "$OUTPUT_DIR/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: "astrowitt-apk-${{ steps.timestamp.outputs.value }}"
          path: "apk-output/${{ steps.timestamp.outputs.value }}/"
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | ${{ env.BUILD_TYPE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Machine** | Standard GitHub Runner |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | ${{ steps.timestamp.outputs.value }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | astrowitt-apk-${{ steps.timestamp.outputs.value }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | ${{ env.APK_NAME }} |" >> $GITHUB_STEP_SUMMARY
